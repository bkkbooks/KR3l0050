body:
  text: 珍席放談卷上宋髙晦叟撰國初循舊制節度使班綴在卿監之下太祖命升于龍墀内今官至觀察使則禮秩與待制等而元戎位列六曹尚書之次居翰林學士之上得其宜矣唐制文武雜任作節度使還朝為省監長貳者間有如顔魯公自江西囬充刑部侍郎叚成公涇原還領司農卿之𩔖是已亦一時之良矩也初外戚罕有建節者太祖時杜審進以元舅之尊窮老纔得節度使本朝之制節度州為三品刺史州為五品蓋五品州則軍事也而命官乃為防禦使則以防禦團練使領刺史州盖本唐制至節度州則非賜旄鉞不以命之若觀察使盖與節度使相須觀察繫州節度繫軍節度可以兼觀察觀察視節度則降殺矣神宗鼎新官制建尚書分六曹以莅事制落成之日命左右僕射赴都省禮上依唐制百官致恭以見王禹玉蔡持正為二揆尚書拜于副階之上而荅拜御史中丞諸曹侍郎以下拜於庭中而跪於堂上以受其參上即聞之翌日登對語及訝不如儀也厥後登庸者亦不復沿襲矣故事知制誥待制權發遣三司使事賜金帶韓玉汝以待制分畫河東地界事畢陳睦以校理使髙麗還追職修撰亦各被賜近時梁材叔胡師文黄師是之徒皆待制並賜雜學士帶亦優禮也舊制公卿士大夫引年者隨其品秩髙下例進散官致仕内外制雜學士前執政官帶職名前宰相帶使弼致仕自熙寧元豐始也石表之以前參知政事自資政殿大學士吏部侍郎太子少傅致仕田宣簡後以樞使罷事觀文殿學士尚書左丞乞致仕亦除太子少傅職任雖殊而恩秩一等前後失于比儗耶輕重繫于當時耶神宗朝王公帶觀文殿大學士在金陵府及生日有㫖契勘有無所賜禮物樞宻院具到宰臣樞宻使帶平章事并使相生日支賜則例進呈特令依在外使相例賜昔趙忠獻拜太師西京養疾國朝故事非帶同平章事無生辰賜物例太宗以普故相特示異數遣使就賜是時自當舉此以聞不知何以遺忘之也本朝舊相不帶平章事生日錫之以禮物唯二公爾本朝小使臣供奉官而下皆𨽻宣徽院院使之恩禮遂同二府而班在樞宻副使之上至雍熙中置三班院專領小使臣授任而宣徽使如舊其後班綴下樞副矣為使者不勝計賜重金帶唯王君貺爾舊令郡守監司通判隨其服色借紫或緋而不垂魚按唐制借緋即佩銀魚借紫即佩金魚亦入銜位書之其法似可襲矣哲宗未親政日宰相吕大防屢更先朝官制事極不經以左右字分有無出身人則右職者分當贓汚而不足怪責矣何其不思之甚也朝廷之士弗聞一言論其疎舛出於畏附而然耶果以為中理而無說耶至上獨攬權綱方命有司復行故典而斥去謬舉天下韙之班固謂霍光曰不學無術大防豈非其儔乎凡詔書徳音立后建儲行大誅討拜免三公宰相樞宻使命將曰制並用白麻紙不使印百官立班宣讀故謂之白麻亦曰宣麻杜子美有詩云紫誥追三代黄麻似六經按杜甫贈張垍詩紫誥仍兼綰黄麻似六經此作追三代未詳所本黄麻不覩所出盖唐貞觀以詔勅多蠧始用黄麻紙書冩爾名與白麻相𩔖而事則殊矣公式舊唯中書門下今唯尚書省發勑書曰故牒諸州出補牒亦稱故牒自餘省臺寺監文移皆云謹牒不易之制也獨䕫州路轉運司公牒輒書故字諸道監司文檄未嘗有𩔖是者也前後主者但相承行無顧條理而更革者近時上官復謁屬僚刺字多云起居某官避參之卑也夫參辭上下通行之制所為起居者其禮至重嫌輕而增重誠為倒置得非循襲其常弗之思乎唐京師錢陌八十五自河而南八十五燕代皆以八十為陌漢王章建言官司出錢陌減其三今則凡官司出入悉用七十七陌謂之省陌者是已獨封贈錢輸官帑陌猶用八十乃唐時餘制也太祖召陳圖南對便殿恩禮甚渥問曰昔堯舜之為天下今可至否對曰堯舜土階三尺茅茨不剪其迹似不可及然能以清淨為治則今之堯舜也上善其對清淨之言起於老莊世多以為道家虛元之說其源蓋出於乾坤易簡之道堯舜繇之修已以安百姓者也希夷舉之以荅睿問可為仁人之言其利溥也豈髙引逺遯方外泛泛之流可攀企哉太祖嘉納帝道日隆聖敬日躋偃武修文函夏奠枕視唐虞無問然矣太祖常下詔吏員繁而求事之治俸禄薄而責人以廉甚無謂也與其冗員而重費不若省官以益俸非獨垂一時之訓足以為萬世之制仁宗臨軒清問賢良之士蘇轍策畧曰陛下近嵗以來宫中貴姬已至千數歌舞飲酒歡樂失節坐朝不聞諮議便殿無所顧問從官奏曰陛下恭儉未嘗若是轍言狂誕恐累盛徳乞行黜落帝曰設制科本求直言蘇轍小官敢言特命收選夫人主言動轍雖妄說果能誑天下之人哉置而不論仍嘉其能賁以恩寵容諫納善堯舜禹湯無以過也章聖嘗謂輔弼曰諸州長吏或廉而肆虐或察而滋擾或掊歛以為公或曠職以為恕此何由致治四者世人不獨不非而反獲休譽多矣安得廉而弗厲察而弗擾公而弗侵恕而弗廢之士與上共理耶田宣簡况有言士君子修身起家易始終盡善難始終盡善易世徳相繼難噫士當窮時艱勤自奮往往能之暨其志得欲充喪其素操盖亦弗稀或已克終而子孫殞家聲者多是公語足以為士大夫之良規也楊文公嘗云人之操履無若誠實此曾子平日三省其身之道而孟子所謂仰不愧於天俯不怍於人者也君子允蹈其可後乎王沂公嘗云是非曲直在聽斷之審請以藥物喻之醫方謂藥物有相使相反者如甘草為國老以性能和衆藥故湯劑中不論寒温多用之而斑猫有毒相反若用之則致害人時以為名論噫攻疾者投藥相反患止一身經國者用人相反弊及天下弗可忽也李􅂖有言壯年仕宦忌於太速肌體患於太豐早速早豐莫能致逺物理自然也而斯乃分定匪繫乎人雖不速不豐有可得耶若謂爵禄用巧心强力必能駛取則誤矣盖有經營而即如其意者是亦命也適與幸㑹焉蘇文忠有言人之仕宦但只作郎官典郡自無患害也盖位髙責重常近顛躓理自然耳正人居要路則忘身許國知之必為羣小側目乘伺間隙邪人知重權則營私罔上言者抵罪貫盈難揜終致發揚邪正不𩔖皆所以貽禍也公言約而㫖深矣龎潁公嘗云大臣尤當祇畏繩墨豈可自恃貴重亂天子法此談足以為鉅人藥石也嘗思法非為君子設世之君子冒而弗憚將何以禦中人之下者哉士大夫有審顧憲章不少踰閑者人或􅅓以為拘出矩度以肆放而無所恤者或推以為才果其然乎若人知法之可虞則世無招尤速累者矣若舉皆避於法則世無能保厥躬者矣繫所自處也先賢云上順公法下順人情故稱循吏可不謂之才乎趙中令舉官詞人有見其故藁但云某當公事如私事愛惜官物如己物誠簡切也世之從仕者多汲汲然營私謀已心惟恐後治公事豈嬰思慮主官物弗入顧盻苐務因循茍且以度嵗時而僥倖襲以成風恬莫怪也能如公所舉則州邑必無稽違帑廪寧有侵蠧矣推士者往往為過情溢美之談曲相藻飾是非可否未免失真視中令得無愧乎孫宣公一代之名儒也乆在經筵嘗取無逸篇繪圖以進真廟援唐明皇時故事爾夫無逸周公所以戒成王欲知先業之艱難而罔可怠豫王道之持盈守成而致長乆安寧之道也宜其置左右起居出入觀瞻念慮焉㓂萊公以將相穹崇歴鎮方面諭擯紹者遇有過客造請常以同年小録與參狀俱呈若其人聨牓而年在已上者雖州縣小官亦展茵席以叙拜禮惇舊如此近時同年事分一空得公之彷彿者可以厚浮俗而為佳話矣㓂萊公當國契丹入境河朔戒嚴朝論二三未知適從獨公勸上親幸澶淵得以振士氣章聖面諭擘畫邊事及駕起與不起至何處者準條四事以對曲盡機要其狀右奏語云陛下睿智淵深聖猷宏逺固以坐籌而决勝尚猶虚已以詢謀兼彼契丹頗乏糧糗雖持甲兵之衆必懐首尾之憂豈敢不顧大軍乃圖深入然亦慮其兇狡須至過有防虞由是宸衷决從其策不惑鑾輿順動敵兵北歸議者以冦公之功烈崛然第一信不誣矣㓂公性尚華侈夏英公亦然夏嘗語門下客曰萊公自奉豪奢而世弗非者至某則云云者多何也客對曰舊傳㓂公在鎮暇日與僚屬出郊圍坐席上聞馱鐸聲遣介問之乃一縣令代還行李經由公即召同席從容宴賞侍中今待入京士大夫與出都之人禮數已自加損况其他歟宜乎物論之不同矣竦黙然乆之夫虚心下士弗論髙卑踈昵者無賢不肖悉皆推尚曲意輕重欲收人情者譽未必至而毁亦莫可逃也李文定年四十方登第陳康肅守鄞時猶在場屋多與之遊每題壁則書布衣李迪捧硯其後李相國而陳方建節升沉淹滯盖叵測也劉温叟岳之子也以父名岳終身不聽樂李文正一代之賢人也嘗云禮不諱嫌名二名不偏諱劉不登嵩華諸岳則可矣而諱岳不聽樂無乃過歟夫岳與樂比其他嫌名異矣耳聞管弦愉樂之音冒父之嫌名而弗顧人子安乎禮以義起豈必須典制顯禁然後避也縁人情論之未為過爾楊文公在翰林母處外被疾請告不待報即去上遣中使賜御封藥洎金帛以賜謂輔臣曰億侍從官安得如此自便王文正對曰億本寒士先帝賞其詞學寘在館殿陛下矜容不然顛躓乆矣然近職不當居外地遂除太常少卿分司夫近侍輕肆而聖君優假大臣又善為之地真幸遇矣王文正公宇量鴻曠絶倫在相府日未還第間上遣中使錫御酒十器方踰閫内厥兄亟令詣國封首取二壺其婦云此上賜也俟相公歸視即持去兄怒挈梃擊壺皆碎醖流盈地夫人怒之不令却掃公歸見之問其故左右具道所以然徐語國封曰人生光景幾許時其間何用校計餘無他言兄與國封黙愧也張文定守江陵嵗大旱田稼將敗民憂艱食公自府宇率僚佐炎日中拖紳端笏撤盖徒步至承天寺佛舍匄雨升殿焚香祀拜才終甘澤飄零霈然霑足邦人舞泳遂獲有秋故老尚能傳道其事以相語至誠感格如是之駛也王沂公罷政柄以相節守西都屬縣兩簿尉同詣府參公見之將命者喝放參訖請升階啜茶二人皆新第經生不閑儀遂拜於堂上既去左右申舉非儀公卷其狀語之曰人拜有甚惡噫大臣包荒固非淺丈夫之可望也吕文靖當國一日歸自中書欲發奏牘令子弟開堂印莫知所在家人駭顧公黙然但命緘扄如故而已翌日至政事堂用印印在如故盖主吏時或竊用自是防察謹嚴奸勿能措若即暴揚窮治則非惟貽中外譏笑而牽連抵罪者亦多矣世皆服公之識度絶人逺甚也吕文靖慶厯在相府乆病昭陵手詔曰古人言髭可療疾雖無痊驗今朕剪髭與夷簡合湯藥表予意也昔白傅詠唐太宗剪髭燒藥賜功臣李勣嗚咽思殺身其渥儷矣君臣之間至恩如此雖殺身詎足以報况勣之阿諛但為謀身之地哉白傅之言不亦過歟范文正公賢髙一代踐更貴仕至登政府常務賙賑宗族以逮孤逺薨之日家無餘貲窀穸有期素相厚善者韓富田裴諸公各出金帛之助狄武襄常在麾下早被知鑒時位樞席賻贈倍腆於諸公夐然有古風槩悠悠之交非其比也范文正公王佐才世所髙仰弗踰大用未究所藴而亡時論悵惜後三十餘年子純仁自同知樞宻院事拜相搢紳多以為宜非如前輩英聲茂實實在人耳目中屬望以相天下者也盖文正位弗稱才公議未契一旦嗣續登庸輿情慰厭爾與魯人欲臧孫達之有後幾矣珍席放談卷上

body:
  text: 提要珍席放談二卷小說家𩔖一雜事之屬臣等謹案珍席放談二卷宋髙晦叟撰晦叟仕履無可考所紀上自太祖下及哲宗時事則崇寜以後人也是書宋史藝文不著録惟文淵閣書目載有一冊世無傳本今散見於永樂大典者尚可裒輯成編謹採集排綴釐為上下二卷書中於朝廷典章制度沿革損益及士大夫言行可為法鑒者隨所聞見分條録載如王旦之友悌吕夷簡之識度富弼之避嫌韓琦之折佞其事皆本傳所未詳可補史文之闕特間加評論是非軒輊往往不能持平又當王氏學術盛行之時於安石多曲加迴䕶頗乖公議然一代掌故猶藉以考見大凡所謂識小之流於史學固不無禆助也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2bd1b823fa1b2f12737571122f1c501e4f7388a982d90ef34fc9dcb87699eece

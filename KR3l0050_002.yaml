body:
  text: 珍席放談卷下宋髙晦叟撰哲宗嗣統宣仁權同聽斷蔡持正以故相典安陸暇日偶作小詩數篇朝散郎吴處厚守漢陽鄰封也平日深嗛蔡秉政時不相推引購得詩本輙以己意曲加注釋以為意在怨訕如其私說飛驛上聞禍起不測遂竄嶺外時上相吕大防等居輔弼之地皆緘黙顧忌無所論辯奉行而已惟右揆范堯夫奏疏理列又與王正仲簾前再三為之辯解不克囘己行之制而二公亦各罷去天下士論靡不賢其人也噫人臣效情與夫媮合者臨事則可見矣可弗察哉范文正殿餘杭時有一近臣同路宴公于堂以其家聲樂相娛繼出俳優男女紛揉褒語交至恠而問其男女誰何主人答云児曹爾公不懌避席即去王荆公具書其事于策真可謂直筆矣富文忠楊隱甫皆晏元獻公婿也公在二府日二人已升貴仕冨每詣謁則書室中㑹話竟日家膳而去楊或來見則坐堂上置酒從容出姬侍奏絃管按歌舞以相娛樂人以是知公待二婿之重輕也二婿之功名年位亦自不相倫矣冨文忠以累朝舊相出鎮河陽龍圖韓贄自西京被召孟洛相去不及百里雖非入都正驛而迂行止一舍爾韓未戒行馳書于公欲因而假道三城以通典謁公報拒之意謂侍從被召不當曲程先展私覿慮招物議大臣于事避慎如此飛謗其能及乎富文忠卜宅洛陽勝偉冠於西都王君貺相繼起第又復過之也然而富公年七十即上印綬乞骸致政優佚自喜家居十朞太原公雖嘗暫止其間老猶任事擁節旄殿方面亟匄歸甚切未俞而終於鎮名圃廣厦虚設爾有而不知足失其所以有者也韓忠獻冨文忠立朝傑然無出其右真社稷之衛邦家之光也仁宗雖任之政府未幾皆出乆留於外四海士民繋望以為相者乆矣上亦終諒其賢嘉祐中相繼秉鈞軸簮緌列辟林麓潜夫拭目延頸競欲觀聽弛張遲遲未有聞見或切語而私恠踰年行祫享大禮於赦文中列廢置者數十事皆興利蠲害之端人同慶幸視其措畫可知其故也世方知二公不即變更盖有待焉因肆赦而推恵者非獨使編氓比戸曉然歸恩於上又免郡縣數數遵承之煩莫不歎誦其徳業不羣也豈非君子之道昭然日彰而宰相自有體者乎韓魏公未相時自政府出更歴方面乆之建節判相州鄴臺公松楸所在也上謝表云鋪排牛酒燕故老於里中羅列旌憧拜先臣於墓下一時之盛事也人子致位若斯來臨鄉社所謂以顯父母者也韓魏公在相府嘉祐中畿邑多蝗朝廷遣使分行督捕時一朝士還闕見公面白縣雖有蝗全不食稼公識其言之佞也遂問有遺種否佞者不期問此遽對遺種不無公曰但恐來年令嗣不及尊君其人慚而退韓魏公秉尸鈞王陶游其門公亦素器之累歴從官及為中丞未登二府怏怏有望於公引摭細故奏疏詆公由此出守轉郡謝上表尤肆狂訐詞皆浮實至舉丁朱崖以况公悖妄弗顧於理甚矣忿欲攻人失其所御一旦至於是也由此大失望陶後雖復用於朝為訃相竟不躋丞弼之列足為躁人鑑矣潞公嘉祐中位元台時上偶違豫二府同宿於内一夕有人欵禁闥告變公即命礱墨於盎呼其人至前濃塗面目驅出斬東華門外翌日都下帖然雖左右亦莫知其上變者誰何也倉卒之間處非常之事如是足鎮服中外絶人逺甚誠社稷之衛也程康穆帥髙陽北使過部稱疾遣人白公欲著帽以見公拒之報曰疾則可無相見見當如禮使人沮伏莫能為辭深得鎮御之方也范蜀公皇祐中知諫院陳恭公為相嬖妾笞殺一婢御史奏論排斥不知所謂遂誣公私其女景仁上言朝廷設臺諫官使除讒慝非使為讒果如其言執中可斬不然則言者亦可斬御史怒共劾其阿宰相范弗顧力論其不然熙寜初歐文忠在政府言官亦誣其私子婦呉氏惟沖卿以己女嘗辨於文疏餘無一言為明其罔衊景仁之心豈特私於相國盖欲為朝廷别枉直惜事體爾何其似之者鮮焉蘇子美年二十一上疏極為切至後以祠㑹棄躓不振未五十淪亡良可歎惋然而是亦韓文公所謂栁子厚少時不自貴重顧藉者也侍郎郎廉叔清風峻節聞於一代嘗師朱頔沈天錫既顯皆均俸及之每致書不稱官止云門生二人既沒又賙其子為畢婚嫁告老還鄉未有居第漸治園廬號武林居士其賢髙矣宋莒公再入政府景文時以端明殿學士守成都輙繫金方團笏頭帶言者上聞朝論欲究然否公白上云臣乆備位二府累蒙賜帶曾寄遺祁兄弟之心覬其早被進用不期遂佩服爾事即中寝可謂善為辭也宋莒公晩年景文奄謝諸姪成服公惡其縗縷太麤命易去有一門客自言素辱恩遇願請以衣當日都下人多傳笑近時有相國誕辰馳至賔次薦紳跪籠放生祝夀之人相埒矣噫士迷深利喪失廉恥莫知自賤者何獨斯焉古傳為要人或持溺器或驗便液盖不誣矣夏文荘豪傑之流也然操行多疵清論寡與慶厯中自前執政拜樞宻使言者排之不已即罷時石守道進聖徳頌其序云皇帝命得象殊為丞相竦樞宻使次云用御史諫官十一疏追竦白麻又除襄為諫官天地人神昆蟲草木無不喜躍皇帝退奸進賢發於至誠奮於睿斷見於剛克公怏怏銜之深歲設水陸齋常旁設一位立牌書曰夙世冤家石介人以謂益彰石之讜言勁節而重自暴其醜也豈非忿懣内懐勿能制而未之思乎神宗在御李端愿納節以少師致仕特給節度使俸之半曹佾拜中書令特贈公使錢一萬貫朱衣雙引皆近朝待戚里之殊禮也曽子宣吕吉甫同為内相與客啜茶注湯者頗數客云爾為翰林司何故不解㸃茶吉甫即云翰林司若盡㑹㸃茶則翰林學士須盡工文章也意譏子宣縁此遂相失矣與武元衡在院中食𤓰驅蠅事頗不逺焉哲宗紹隆丕搆拓大提封劉舜卿帥熙河出兵塞外破敵壘擒其帥鬼章至庭下倨悍不拜竟弗能屈反善遇之識者以謂若因其慢即時出於不測斬首以徇揚威示武則餘𩔖必沮勢喪氣乗機足以掃蕩也此正閫外之事専之可也雖罪擅誅何避焉舜卿庸才不能建偉然之事區區畏首畏尾圖全之策執俘以煩朝廷謬矣人君何賴焉魏文帝云文人相輕自古而然翰墨之流貴已忽人其源乆矣無足恠惟自視有餘裕者不然如韓退之未嘗弗推子厚杜子美未嘗弗稱太白豈區區務取勝也江南李後主善詞章能書畫皆臻妙絶是時紙筆之𩔖亦極精緻世傳尤好玉屑牋於蜀主求牋匠造之唯六合水最宜於用即其地製作今本土所出麻紙無異玉屑盖所造遺範也王元之詞學器識度越當代太宗深所器異而天資忠勁知無不言言無所徇始以知制誥坐事貶商州團練副使還朝上曰王文章俊頴人罕偕者但性剛直不甚容物命宰相召戒之後又繼𬒳貶斥皆以論議也嘗為三黜賦云一生幾日八年三黜始貶商於親老且疾兒未免乳􅈱􅈱擁樹六百里之窮山唯毒蛇與贙虎歴二稔而生還幸舉族而無苦再謫滁上吾親已喪几筵未收旅櫬未塟泣血就路痛彼蒼兮安仰移郡印於淮海信靡盬而鞅掌旋號赴於國哀亦事居而送往叨四入於掖垣何寵禄之便蕃今去齊安髪白目昬吾子有孫始笑未言去無騎乗留無田園羝羊觸藩老鶴乗軒不我知者猶謂乎郎官貴而郡守尊也於戲令尹無愠吾之所師下恵不耻吾其庶幾卞和之刖吾乃完肌曹沫之敗吾非輿尸緘金人之口復白圭之詩細不宥兮過可補思而行兮悔可追慕康侯之晝接兮茍無所施徒錫馬而胡為効仲尼之日省兮茍無所為雖歎鳳而奚悲夫如是屈于身兮不屈其道任百謫而何虧吾當守正直兮佩仁義期終身以行之公之志斯可識矣然而直之為行可晦而弗可恃臯陶所謂直而温叔向以直及難是已元之表啓精緻如諸縣豐登全無公事一家飽暖盡荷君恩三神山上曾陪鶴駕之游六學士中獨有漁翁之歎人多傳誦知制誥被謫未幾復職謝牘云階前藥樹重吟謝客之詩觀裏桃花免動劉郎之歎此句尤微婉也田宣簡公天資寛明忠厚海内之賢帥平凉日置酒與僚屬相集路分都監雍元規者酌飲踰常言色失度曳裾離席而逰詰旦方悟愧畏不勝即馳詣公深自咎謝公温然軟語以存慰之既去尚慮其内弗安也後數日諭副帥范恪宴兵官于西池席半贈以詩曰醒時莫憶醉時事今日休言昨日非池上風光宜共釂勸君不要半酣歸元規幾于感泣方寜處矣論者莫不歎公之徳量足以容物大過人也宣簡嘗過箕山望潁水有詩云先生嘗此傲明時緑岫清波萬古竒應有好名心未息灘頭洗耳欲人知帝以天下讓若自得而無待於外則遜避而已烏用洗耳哉洗耳乃欲暴揚其髙風於四方萬世也公能探其情矣宣簡初登大科通守金陵日有李琵琶者本建康伶人國除時十餘歲逮兹近八十因宴席呼出猶能飲巨觥陳叙平昔歴厯可聽辭容不甚追愴若無情人又云後主喜音藝選教坊之尤者號别勅都知日夕侍宴自稱父喜琵琶名冠别選王師圍城未䧟間後主猶未輟樂但云甚迷公有詩卒章曰曲終甚喜詢前事自言本是都知子當時此地最繁華酒酣不覺恣矜誇若使斯人解感傷豈能終老愛琵琶誠如所謂矣以其無情所以道往事奏舊曲而不悲淪落泥塗而長年也古詩云寡欲罕所闕味薄真自幸又曰多情真薄命容易即囬腸噫於物味濃而情勿遷者未嘗不為身之累焉亦賤分致然己莫能而取舍爾若李琵琶在人間幸未必不多而命未必不厚也楊文公入省校試天下士既出真廟問云聞卿都堂簾中哄笑何故對曰有舉人上請堯舜是幾事臣答以有疑時不要使因此同僚皆以為笑上為之動容范蜀公嘗書于簡在南唐時已著斯事矣侍郎楊鸞乃國相湯恱之妹婿問恱曰堯舜不知幾件事荅云如此疑事不要使噫荒唐之流多矣何獨此子耶冨文忠當軸殿帥闕進擬除授上謂公曰張茂實乆次何不與選對曰茂實雖可任曽同臣北使恐致物議故不敢引用上曰朝廷公舉何恤人言遂被擢御史中丞韓絳不知所以奏論其事果如文忠之說彈其非公丞相即日家居拜章引咎云觀絳所言皆中臣病無路可逃於斧鉞胡顔再覲於宸旒盖上自知本末不假剖析爾絳由是謫去猶堅乞出外歐陽永叔時為内制批荅云事縁曖昧語渉中傷遽罷憲司以釋羣惑雖朕之不明不敏能為卿而辨之而卿亦何嫌何疑遂將去朕而不顧避辭已確敦喻亦勤其體予懷復安厥位使天下曉然知朕任賢而無貳也君臣相與至矣然而非歐之筆亦莫能發揮人主之誠意如此之著切而使大臣釋然感通也韓富二公功與夫當世人望不啻古之王佐也天下無賢不肖稱韓冨二公亦素相厚韓嘗寄詩文忠云二州連結子孫契十載同馳忠義名治平間韓位元台富為樞相舉錯之間事有矛盾由是失歡而弗顧相繼而去位音問慶弔亦皆闊略所謂勢疑則隙生力侔則亂起豈虚言乎名賢尚爾况庸人哉馮當時為舉子時卷中詠温泉云他如氷雪爾如湯他學安流爾沸揚人事如今貴和合莫將寒暑苦參商平生多可少怪于物無忤志見于此篇矣文潞公守成都獻燈籠錦於温成宫中都下傳其新異代還輔政繼而宰國唐子方為言官舉貢錦事廷斥其姦詞甚鯁忤天子震怒而不懾左右之人靡不為之惴惴也坐是竄逐嶺外李師中有詩送行云孤忠自許時不與獨立敢言人所難去國一身輕似葉髙名千載重如山並游英俊顔何厚未死奸諛骨已寒天意若思安社稷肯教夫子不生還人有易未字作尚者盖有所諱爾當時義夫志士非獨欽唐之孤節勁氣而亦重李之銳然樂善成美矣後子方聲問寖揚禄位益顯為御史中丞俛黙以養譽望而無所建明不若前時之國爾忘家也李遂貽書誚其故索取昔年所送之詩可謂直諒之友焉噫士之微時以忠義自處奮振身名一旦踐更要地冒榮固寵為私己之謀勿變其操者尠可責止於唐歟王荆公登庸謝表云念善俗之方姑務徐徐而改革思愛日之義又將汲汲以施為公之志於是可見矣世之言者謂公得君專天下之政弛張庶務峻切而弗以漸致異論蠭起果知公乎荆公在政府鼎新百度真大有為也有小詩云金明池道栁參天投老歸來聽管絃飽食大官猶昔日夕陽流水思茫然此乃失意無聊者語也公方君臣相遇謀合計從不應有此句識者頗恠之也其後去國乆居閑地遂如所詠爾荆公深知吕吉甫力薦於上遽位要津不數年同在政府勢焰相軋遂致嫌隙吕並不安謂人曰恵卿讀儒書只知仲尼之可尊㸔外典只知佛之可貴今之世只知介甫之可師不意為人讒失平日之歡且容恵卿善去人有達其言於公者公聞之語其子元澤曰吕六却如此使人不忍其子答云公雖不忍人將忍公矣公黙然夫父子天資厚薄相遼冝其道之至妙莫能相傳授也五代僣亂之國十竊帝號而不奉正朔者七江南楊溥李昪蜀王建孟知祥南漢劉陟閩中王延鈞河東劉崇耳宋元憲歐文忠皆言得錢鏐時封落星石為寳應山制稱寳正六年疑錢氏亦嘗改元稱帝而後諱之也歐公又云閱呉越與諸國往來書多皆無稱帝事竊意當時稱帝改元獨施於境内不見於四方焉不然則安得全無旁見之迹也太原劉氏舊城雖已殘廢而餘址巋然形勢山聳當時匝合及四十里氣槩雄壯可想也周世宗征之不克祖宗相繼親御六師方縶頑童以區區一隅之力抗中原全盛之鋒非恃金湯雄壮安能遷延歲月耶四陲要地今雖壁壘整固或寖增大能與彼相𩔖則非惟足以待冦之來冦亦自潜戢矣章聖卜地建玉清昭應宫望氣者宻以語人其地當出二天子人未然之不乆宫災鞠為殘燼即其廢址作睦親宅以居宗室永厚永裕二帝降生邸中相繼潜躍以福蒼生術士往日所占果不妄矣文靖長於知人世能道其事者王仲儀故相子待制年未四十一日謁公簮紳騎從華奕公二子窺之相與羡慕公知而語曰汝輩何愛王某對云以其少年榮達耳又告之曰爾曹皆當逺過斯人二子者晦叔寳臣一宰相一樞宻使鑒裁之精如此丁晉公竄朱崖到海上遇異人頗道平生休咎有驗又云公但無慮非乆當復北歸以夀終公叩其由答曰公食料中尚有羊數口食之未既爾後果來旋以正卿分司然後逝人之飲醊可肆心而越分乎王逵為湖南轉運使永州何僊姑者曾遇異人得道術迹甚竒恠士大夫多訪其居王行部至永要詣舟中留宿數夕魏瓘帥長沙與之不協遂聞諸朝云逵取無夫婦人宿于船由是罷魏所言雖險妄而逵為使者舉措殊弗逺嫌取人指目亦未得無罪焉古人於寡婦之子非有見焉不與之友可弗念哉賈文元未及誕彌之月母夢人遺之一冠既寤猶記其形制繪以示人乃貂蟬冠也後公位躋侍中告薨王荆公作挽詞云天上貂蟬曽夢賜歸魂應侍紫陽宫述其事也張鄧公在相位喪閨女几上書薄福字趙恱道止一子守成都日化去得訃冩寃家字于書背制服哀慟已而無復悲思茲亦近時宗工中之達者也王元之淳化中在禁從八月晦日夢賦詩上前既寤惟記一句云九日山中見菊花莫喻其然也翌日授商州團練副使孟冬初抵官所菊紛盈於目神先告乎竟淹徊於翰林坎坷於外弗踰大用而亡亦詩䜟爾豈偶然哉冨文忠甲辰年丙寅月丙午日癸巳時生韓忠獻戊申年庚申月庚申日庚辰時生昔有善術者云冨命可及九分韓不及一二分功名禄位弗相上下論者莫以為然厥後忠獻薨時才年六十文忠還政優㳺自適十年方捐館夀八十始信術之精㣲也珍席放談卷下
